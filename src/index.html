<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Play the classic 2048 puzzle game in your browser. Merge tiles, track your score, and reach 2048."
    />
    <title>2048 Game</title>
    <link rel="icon" type="image/svg+xml" href="./images/favicon.svg" />
    <link rel="stylesheet" href="./styles/main.scss" />
  </head>
  <body>
    <div class="container">
      <div class="game-header">
        <h1>2048</h1>
        <div class="controls">
          <p class="info">
            Score:
            <span class="game-score" aria-live="polite">0</span>
          </p>
          <button class="button start" type="button">Start</button>
        </div>
      </div>

      <table class="game-field" aria-label="2048 game board">
        <tbody>
          <tr class="field-row">
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
          </tr>

          <tr class="field-row">
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
          </tr>

          <tr class="field-row">
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
          </tr>

          <tr class="field-row">
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
            <td class="field-cell"></td>
          </tr>
        </tbody>
      </table>

      <div class="message-container">
        <p class="message message-lose hidden" aria-live="polite">
          You lose! Restart the game?
        </p>
        <p class="message message-win hidden" aria-live="polite">
          Winner! Congrats! You did it!
        </p>
        <p class="message message-start" aria-live="polite">
          Press "Start" to begin game. Good luck!
        </p>
      </div>
    </div>
    <script type="module" src="scripts/main.js"></script>
  </body>
</html>
